name: OTA Update (EAS Update)

# Ship JS/asset-only changes to users without a store build. Pushing to master
# publishes an update to the "production" channel; installed apps download it on
# their next launch and apply it on the launch after that.
#
# runtimeVersion is "appVersion" (see app.json), so an update only reaches
# binaries built from the same app.json version — a native change that isn't
# accompanied by a version bump would otherwise ship JS that needs a missing
# native module. TEAM RULE: any change to native deps (package.json) or plugins
# (app.json) MUST bump expo.version in the same PR, then go out as a store
# release, not an OTA.
on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      message:
        description: Update message shown on expo.dev
        required: false
        default: manual dispatch

concurrency:
  group: ota-production
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      # Don't ship broken or vulnerable JS over the air — gate on green checks
      # and the same high/critical dependency audit as CI.
      - name: Typecheck & test
        run: |
          npm run typecheck
          npx jest --ci
      - name: Audit (fail on high/critical)
        run: npm audit --audit-level=high

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update
        # push -> commit message; manual dispatch -> the input (default below).
        run: eas update --channel production --message "${{ github.event.head_commit.message || github.event.inputs.message }}" --non-interactive
